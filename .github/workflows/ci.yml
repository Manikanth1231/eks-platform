name: CI - Build, Scan and Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  build-scan-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [user-service, order-service, api-gateway]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo ${{ github.ref_name }} | sed 's/\//-/g')
          IMAGE_TAG="${BRANCH}-${SHORT_SHA}"
          IMAGE_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/dev/${{ matrix.service }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}"   >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}"   >> $GITHUB_OUTPUT
          echo "Building: ${IMAGE_URI}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_uri }} \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/dev/${{ matrix.service }}:latest \
            ./app/${{ matrix.service }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.meta.outputs.image_uri }}
          format:         table
          exit-code:      1
          severity:       CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format:    sarif
          output:    trivy-${{ matrix.service }}.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      - name: Push image to ECR
        if: github.event_name == 'push'
        run: |
          docker push ${{ steps.meta.outputs.image_uri }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/dev/${{ matrix.service }}:latest
          echo "✅ Pushed: ${{ steps.meta.outputs.image_uri }}"

      - name: Summary
        if: always()
        run: |
          echo "## CI Summary - ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |"                     >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|"                     >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ |"                        >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scan | ✅ |"                   >> $GITHUB_STEP_SUMMARY
          echo "| Push to ECR | ✅ |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ steps.meta.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
