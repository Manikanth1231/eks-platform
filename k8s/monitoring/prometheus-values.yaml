# ─── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    # Use emptyDir instead of PVC to avoid storage class issues
    storageSpec: {}
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  service:
    type: LoadBalancer

# ─── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  adminPassword: "admin123"
  service:
    type: LoadBalancer
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

# ─── AlertManager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage: {}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ─── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── Kube State Metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
