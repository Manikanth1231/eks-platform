# ─── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # How long to keep metrics data
    retention: 15d

    # Storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Scrape all pods with prometheus annotations
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    # Resource limits
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  service:
    type: LoadBalancer

# ─── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  adminPassword: "admin123"

  service:
    type: LoadBalancer

  # Pre-load useful dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards/default

  # Import community dashboards by ID
  dashboards:
    default:
      # Kubernetes cluster overview
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      # Node metrics
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus
      # Pod metrics
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

# ─── AlertManager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ─── Node Exporter ─────────────────────────────────────────────────────────────
# Collects CPU, memory, disk metrics from each node
nodeExporter:
  enabled: true

# ─── Kube State Metrics ────────────────────────────────────────────────────────
# Collects K8s object metrics (deployments, pods, etc.)
kubeStateMetrics:
  enabled: true
