apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: microservices-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: microservices
      rules:
        # Alert if any pod is down for more than 1 minute
        - alert: PodDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is down"
            description: "Pod has been down for more than 1 minute"

        # Alert if CPU usage is above 80%
        - alert: HighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="microservices"}[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.pod }}"
            description: "CPU usage is above 80% for 5 minutes"

        # Alert if memory usage is above 80%
        - alert: HighMemoryUsage
          expr: |
            container_memory_usage_bytes{namespace="microservices"}
            / container_spec_memory_limit_bytes{namespace="microservices"} > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory on {{ $labels.pod }}"
            description: "Memory usage is above 80% for 5 minutes"

        # Alert if pod restarts more than 3 times
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="microservices"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod has restarted more than 3 times in 15 minutes"
