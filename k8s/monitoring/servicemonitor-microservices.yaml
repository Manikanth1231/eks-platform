# ServiceMonitor for user-service
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - microservices
  selector:
    matchLabels: {}
  endpoints:
    - port: http
      path: /health
      interval: 30s
