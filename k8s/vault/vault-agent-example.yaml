apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-example
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-example
  template:
    metadata:
      labels:
        app: vault-example
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "microservices"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/microservices/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/microservices/db" -}}
          export DB_USERNAME="{{ .Data.data.username }}"
          export DB_PASSWORD="{{ .Data.data.password }}"
          export DB_HOST="{{ .Data.data.host }}"
          export DB_PORT="{{ .Data.data.port }}"
          {{- end }}
    spec:
      serviceAccountName: vault-auth
      containers:
        - name: app
          image: nginx:alpine
          command: ["/bin/sh"]
          args: ["-c", "while true; do sleep 30; done"]
